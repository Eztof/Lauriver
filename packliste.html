<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Packliste – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    // Firebase-Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:1rem; background:#eef2f5; }
    header { display:flex; align-items:center; }
    header button { margin-right:auto; padding:8px 12px; cursor:pointer; }
    main { max-width:500px; margin:2rem auto; background:#fff; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.1); border-radius:8px; }
    h1 { margin-top:0; text-align:center; }
    ul { list-style:none; padding:0; }
    li { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #ddd; }
    .remove { background:none; border:none; cursor:pointer; font-size:1rem; }
    #new-item { width:calc(100% - 100px); padding:8px; font-size:1rem; }
    #add-btn { width:80px; padding:8px; font-size:1rem; cursor:pointer; }
    .input-row { display:flex; margin-bottom:12px; }
  </style>
</head>
<body>
  <script>
    auth.onAuthStateChanged(user => {
      if (!user) return window.location.href = 'login.html';
      loadPackliste(user.uid);
    });

    function loadPackliste(uid) {
      db.collection('users').doc(uid).get().then(doc => {
        if (!doc.exists) return;
        const list = doc.data().packliste || [];
        renderList(list);
      });
    }

    function renderList(items) {
      const ul = document.getElementById('list');
      ul.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.className = 'remove';
        btn.addEventListener('click', () => removeItem(item));
        li.appendChild(btn);
        ul.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('new-item');
      const val = input.value.trim();
      if (!val) return;
      const uid = auth.currentUser.uid;
      const ref = db.collection('users').doc(uid);
      ref.update({
        packliste: firebase.firestore.FieldValue.arrayUnion(val)
      }).then(() => {
        input.value = '';
        loadPackliste(uid);
      });
    }

    function removeItem(item) {
      const uid = auth.currentUser.uid;
      db.collection('users').doc(uid).update({
        packliste: firebase.firestore.FieldValue.arrayRemove(item)
      }).then(() => {
        loadPackliste(uid);
      });
    }
  </script>

  <header>
    <button id="back">← Zurück</button>
    <h2>Packliste</h2>
  </header>

  <main>
    <h1>Deine Packliste</h1>
    <div class="input-row">
      <input type="text" id="new-item" placeholder="Neuer Eintrag…">
      <button id="add-btn">Hinzufügen</button>
    </div>
    <ul id="list"></ul>
  </main>

  <script>
    document.getElementById('back').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
    document.getElementById('add-btn').addEventListener('click', addItem);
    document.getElementById('new-item').addEventListener('keypress', e => {
      if (e.key === 'Enter') addItem();
    });
  </script>
</body>
</html>
