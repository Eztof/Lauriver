<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Packliste – Lauriver</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>

  <!-- Gemeinsame CSS & Dark‑Mode‑Loader -->
  <link rel="stylesheet" href="style.css">
  <script src="darkmode.js" defer></script>

  <style>
    main { max-width:500px; margin:2rem auto; padding:20px; }
    ul { list-style:none; padding:0; }
    li { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--card-shadow); }
    .remove { background:none; border:none; cursor:pointer; }
    .input-row { display:flex; margin-bottom:12px; }
    #new-item { flex:1; padding:8px; font-size:1rem; border:1px solid var(--card-shadow); }
    #add-btn { margin-left:8px; padding:8px 12px; font-size:1rem; }
  </style>
</head>
<body>
  <script>
    auth.onAuthStateChanged(user => {
      if (!user) return window.location.href = 'login.html';
      loadPackliste(user.uid);
    });

    function loadPackliste(uid) {
      db.collection('users').doc(uid).get().then(doc => {
        renderList(doc.data().packliste || []);
      });
    }
    function renderList(items) {
      const ul = document.getElementById('list');
      ul.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.className = 'remove';
        btn.addEventListener('click', () => removeItem(item));
        li.appendChild(btn);
        ul.appendChild(li);
      });
    }
    function addItem() {
      const val = document.getElementById('new-item').value.trim();
      if (!val) return;
      const uid = auth.currentUser.uid;
      db.collection('users').doc(uid)
        .update({ packliste: firebase.firestore.FieldValue.arrayUnion(val) })
        .then(() => {
          document.getElementById('new-item').value = '';
          loadPackliste(uid);
        });
    }
    function removeItem(item) {
      const uid = auth.currentUser.uid;
      db.collection('users').doc(uid)
        .update({ packliste: firebase.firestore.FieldValue.arrayRemove(item) })
        .then(() => loadPackliste(uid));
    }
  </script>

  <header>
    <button onclick="location.href='index.html'">← Start</button>
    <h2>Packliste</h2>
  </header>

  <main>
    <h1>Deine Packliste</h1>
    <div class="input-row">
      <input type="text" id="new-item" placeholder="Neuer Eintrag…">
      <button id="add-btn">Hinzufügen</button>
    </div>
    <ul id="list"></ul>
  </main>

  <script>
    document.getElementById('add-btn').addEventListener('click', addItem);
    document.getElementById('new-item').addEventListener('keypress', e => {
      if (e.key === 'Enter') addItem();
    });
  </script>
</body>
</html>
