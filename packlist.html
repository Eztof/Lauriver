<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Packlisten – Lauriver</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <!-- Listen-Übersicht -->
    <section id="overview">
      <header class="header">
        <button id="btn-back" class="btn secondary">Zurück</button>
        <h1>Packlisten</h1>
        <button id="btn-new-list" class="btn primary">+ Liste</button>
      </header>
      <ul id="lists" class="card-list"></ul>
    </section>

    <!-- Detail einer Liste -->
    <section id="detail" class="hidden">
      <header class="header">
        <button id="btn-close" class="btn secondary">Zurück</button>
        <h1 id="list-title"></h1>
        <button id="btn-add-item" class="btn primary">+ Eintrag</button>
      </header>
      <ul id="items" class="card-list"></ul>
      <button id="btn-delete-list" class="btn danger block">Liste löschen</button>
    </section>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/packlist.js"></script>
</body>
</html>
