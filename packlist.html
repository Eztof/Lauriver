<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packliste – Lauriver</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>Packliste</h1>
    </header>

    <section id="lists-overview">
      <button id="btn-new-list" class="action">Neue Packliste anlegen</button>
      <ul id="lists"></ul>
      <button id="btn-back" class="action">Zurück zur Startseite</button>
    </section>

    <section id="list-detail" class="hidden">
      <h2 id="list-title"></h2>
      <button id="btn-add-item" class="action">Eintrag hinzufügen</button>
      <ul id="items"></ul>
      <button id="btn-delete-list" class="action danger">Packliste löschen</button>
      <button id="btn-close-detail" class="action">Zurück</button>
    </section>
  </div>

  <!-- Firebase & App Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/packlist.js"></script>
</body>
</html>
