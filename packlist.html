<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packliste – Lauriver</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <header class="header">
      <button id="btn-back" class="btn icon-btn">&larr;</button>
      <h1>Packlisten</h1>
      <button id="btn-new-list" class="btn primary">+ Neue Liste</button>
    </header>

    <!-- Übersichtsseite -->
    <section id="lists-overview">
      <ul id="lists" class="card-list"></ul>
    </section>

    <!-- Detailseite -->
    <section id="list-detail" class="hidden">
      <header class="header">
        <button id="btn-close-detail" class="btn icon-btn">&larr;</button>
        <h1 id="list-title"></h1>
        <button id="btn-add-item" class="btn primary">+ Eintrag</button>
      </header>
      <ul id="items" class="card-list"></ul>
      <button id="btn-delete-list" class="btn danger block">Liste löschen</button>
    </section>
  </div>

  <!-- Firebase & App Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/packlist.js"></script>
</body>
</html>
