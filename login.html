<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lauriver Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Willkommen</h1>
    <!-- Login -->
    <form id="login-form">
      <input type="email" name="email" placeholder="E‑Mail" required>
      <input type="password" name="password" placeholder="Passwort" required>
      <label><input type="checkbox" id="remember"> Angemeldet bleiben</label>
      <button type="submit">Einloggen</button>
    </form>
    <hr>
    <!-- Signup -->
    <form id="signup-form">
      <input type="email" name="email" placeholder="E‑Mail neu" required>
      <input type="password" name="password" placeholder="Passwort neu" required>
      <button type="submit">Registrieren</button>
    </form>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/firebase.js"></script>
</body>
</html>
