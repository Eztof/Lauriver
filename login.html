<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login – Lauriver</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/login.js" defer></script>
</head>
<body>
  <main>
    <section class="card" id="auth-container">
      <!-- Login-Form -->
      <form id="login-form">
        <h2>Anmelden</h2>
        <input id="login-username" type="text" placeholder="Benutzername" required autocomplete="username">
        <input id="login-password" type="password" placeholder="Passwort" required autocomplete="current-password">
        <label><input id="remember-me" type="checkbox"> Gerät merken</label>
        <button type="submit">Anmelden</button>
      </form>
      <p><a href="register.html">Registrieren</a></p>
    </section>
  </main>
</body>
</html>
