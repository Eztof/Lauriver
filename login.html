<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#fafafa; }
    form { display:flex; flex-direction:column; width:300px; padding:20px; background:#fff; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    input, button, label { margin:8px 0; padding:10px; font-size:1rem; }
    button { cursor:pointer; }
    a { color:#0066cc; text-decoration:none; }
    h1 { margin-bottom:10px; text-align:center; }
    p { text-align:center; font-size:0.9rem; margin-top:12px; }
  </style>
</head>
<body>
  <form id="login-form">
    <h1>Anmelden</h1>
    <input type="text" id="login-user" placeholder="Benutzername" required>
    <input type="password" id="login-pass" placeholder="Passwort" required>
    <label><input type="checkbox" id="remember" checked> Gerät merken</label>
    <button type="submit">Login</button>
    <p><a href="register.html">Registrieren</a></p>
  </form>

  <script>
    const domain = 'lauriver-31a6f.firebaseapp.com';
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;
      const remember = document.getElementById('remember').checked;
      const email    = `${username}@${domain}`;

      const persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => auth.signInWithEmailAndPassword(email, password))
        .then(cred => {
          const uid     = cred.user.uid;
          const userRef = db.collection('users').doc(uid);
          return db.runTransaction(tx =>
            tx.get(userRef).then(doc => {
              if (!doc.exists) throw new Error('User-Dokument fehlt!');
              const newVisits = (doc.data().visits || 0) + 1;
              tx.update(userRef, {
                visits:    newVisits,
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
              });
            })
          );
        })
        .then(() => window.location.href = 'index.html')
        .catch(err => {
          if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
            alert('Benutzername oder Passwort ist falsch.');
          } else {
            alert('Fehler: ' + err.message);
          }
        });
    });
  </script>
</body>
</html>
