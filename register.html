<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrieren – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  <style>
    body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#fafafa; }
    form { display:flex; flex-direction:column; width:280px; }
    input, button, label { margin:8px 0; padding:8px; font-size:1rem; }
    button { cursor:pointer; }
    a { color:#0066cc; text-decoration:none; }
  </style>
</head>
<body>
  <form id="register-form">
    <h1>Registrieren</h1>
    <input type="text" id="reg-user" placeholder="Benutzername" required>
    <input type="password" id="reg-pass" placeholder="Passwort" required>
    <label>
      <input type="checkbox" id="remember" checked>
      Gerät merken
    </label>
    <button type="submit">Registrieren</button>
    <p>Schon einen Account? <a href="login.html">Zum Login</a></p>
  </form>

  <script>
    const auth = firebase.auth();
    const domain = 'lauriver-31a6f.firebaseapp.com'; // für Dummy-E-Mail
    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      const remember = document.getElementById('remember').checked;
      const email = `${username}@${domain}`;

      const persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => {
          return auth.createUserWithEmailAndPassword(email, password);
        })
        .then(cred => {
          // DisplayName auf Username setzen
          return cred.user.updateProfile({ displayName: username });
        })
        .then(() => {
          window.location.href = 'index.html';
        })
        .catch(err => {
          if (err.code === 'auth/email-already-in-use') {
            alert('Der Benutzername ist leider schon vergeben.');
          } else {
            alert('Fehler: ' + err.message);
          }
        });
    });
  </script>
</body>
</html>
