<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrieren – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    // Deine Firebase-Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#fafafa; }
    form { display:flex; flex-direction:column; width:300px; padding:20px; background:#fff; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    input, button, label { margin:8px 0; padding:10px; font-size:1rem; }
    button { cursor:pointer; }
    a { color:#0066cc; text-decoration:none; }
    h1 { margin-bottom:10px; text-align:center; }
  </style>
</head>
<body>
  <form id="register-form">
    <h1>Registrieren</h1>
    <input type="text" id="reg-user" placeholder="Benutzername" required>
    <input type="password" id="reg-pass" placeholder="Passwort" required>
    <label><input type="checkbox" id="remember" checked> Gerät merken</label>
    <button type="submit">Registrieren</button>
    <p style="text-align:center; font-size:0.9rem;">Schon einen Account? <a href="login.html">Zum Login</a></p>
  </form>

  <script>
    const domain = 'lauriver-31a6f.firebaseapp.com';
    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      const remember = document.getElementById('remember').checked;
      const email    = `${username}@${domain}`;

      const persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(() => auth.createUserWithEmailAndPassword(email, password))
        .then(cred => {
          // DisplayName setzen
          return cred.user.updateProfile({ displayName: username })
            .then(() => cred.user);
        })
        .then(user => {
          // Firestore‑Eintrag anlegen
          return db.collection('users').doc(user.uid).set({
            username:  user.displayName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
            visits:    0,
            settings:  {},
            usageData: {}
          });
        })
        .then(() => {
          window.location.href = 'index.html';
        })
        .catch(err => {
          if (err.code === 'auth/email-already-in-use') {
            alert('Der Benutzername ist leider schon vergeben.');
          } else {
            alert('Fehler: ' + err.message);
          }
        });
    });
  </script>
</body>
</html>
