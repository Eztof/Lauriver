<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Registrieren – Lauriver</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/login.js" defer></script>
</head>
<body>
  <main>
    <section class="card">
      <form id="register-form">
        <h2>Registrieren</h2>
        <input id="reg-username" type="text" placeholder="Benutzername" required autocomplete="username">
        <input id="reg-password" type="password" placeholder="Passwort (min. 6 Zeichen)" required autocomplete="new-password">
        <button type="submit">Registrieren</button>
      </form>
      <p><a href="login.html">Zurück zum Login</a></p>
    </section>
  </main>
</body>
</html>
