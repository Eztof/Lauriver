<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Einstellungen – Lauriver</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>

  <!-- Gemeinsame CSS & Dark‑Mode‑Loader -->
  <link rel="stylesheet" href="style.css">
  <script src="darkmode.js" defer></script>

  <style>
    main { max-width:400px; margin:2rem auto; padding:20px; }
    label { display:flex; align-items:center; margin:1rem 0; }
    label input { margin-right:8px; }
    button.save { width:100%; padding:10px; font-size:1rem; }
  </style>
</head>
<body>
  <script>
    auth.onAuthStateChanged(user => {
      if (!user) return window.location.href = 'login.html';
      // Einstellungen laden
      db.collection('users').doc(user.uid).get().then(doc => {
        const dm = doc.data().settings?.darkMode;
        document.getElementById('dark-mode').checked = !!dm;
      });
    });
  </script>

  <header>
    <button onclick="location.href='index.html'">← Start</button>
    <h2>Einstellungen</h2>
  </header>

  <main>
    <h1>Dark Mode</h1>
    <label>
      <input type="checkbox" id="dark-mode">
      Dunkles Design aktivieren
    </label>
    <button class="save" id="save-btn">Speichern</button>
  </main>

  <script>
    // Live‑Toggle
    document.getElementById('dark-mode').addEventListener('change', e => {
      document.documentElement.classList.toggle('dark', e.target.checked);
    });
    // Speichern
    document.getElementById('save-btn').addEventListener('click', () => {
      const on = document.getElementById('dark-mode').checked;
      db.collection('users').doc(auth.currentUser.uid)
        .update({ 'settings.darkMode': on })
        .then(() => alert('Gespeichert!'))
        .catch(err => alert('Fehler: ' + err.message));
    });
  </script>
</body>
</html>
