<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lauriver</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <img src="assets/logo.png" alt="Lauriver Logo" class="logo"/>
      <h1>Lauriver</h1>
    </header>

    <!-- Registration Form -->
    <section id="register-section" class="auth-section hidden">
      <h2>Registrieren</h2>
      <input id="reg-username" type="text" placeholder="Benutzername" />
      <input id="reg-password" type="password" placeholder="Passwort" />
      <label>
        <input id="reg-remember" type="checkbox" />
        Gerät merken
      </label>
      <button id="btn-register">Registrieren</button>
      <p>Oder <a href="#" id="show-login">einloggen</a></p>
    </section>

    <!-- Login Form -->
    <section id="login-section" class="auth-section">
      <h2>Login</h2>
      <input id="login-username" type="text" placeholder="Benutzername" />
      <input id="login-password" type="password" placeholder="Passwort" />
      <label>
        <input id="login-remember" type="checkbox" />
        Gerät merken
      </label>
      <button id="btn-login">Einloggen</button>
      <p>Oder <a href="#" id="show-register">registrieren</a></p>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" class="hidden">
      <div id="counter"></div>
      <button id="btn-logout">Logout</button>
    </section>

    <footer>
      <small>© Lauriver</small>
    </footer>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/countdown.js"></script>
</body>
</html>
