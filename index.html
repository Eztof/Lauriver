<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lauriver</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Lauriver</h1>
    </header>

    <!-- Registration Form -->
    <section id="register-section" class="auth-section hidden">
      <h2>Registrieren</h2>
      <form id="form-register">
        <input
          id="reg-username"
          name="username"
          type="text"
          placeholder="Benutzername"
          autocomplete="username"
          required
        />
        <input
          id="reg-password"
          name="password"
          type="password"
          placeholder="Passwort"
          autocomplete="new-password"
          required
        />
        <label>
          <input id="reg-remember" type="checkbox" />
          Gerät merken
        </label>
        <button id="btn-register" type="submit">Registrieren</button>
      </form>
      <p>Oder <a href="#" id="show-login">einloggen</a></p>
    </section>

    <!-- Login Form -->
    <section id="login-section" class="auth-section">
      <h2>Login</h2>
      <form id="form-login">
        <input
          id="login-username"
          name="username"
          type="text"
          placeholder="Benutzername"
          autocomplete="username"
          required
        />
        <input
          id="login-password"
          name="password"
          type="password"
          placeholder="Passwort"
          autocomplete="current-password"
          required
        />
        <label>
          <input id="login-remember" type="checkbox" />
          Gerät merken
        </label>
        <button id="btn-login" type="submit">Einloggen</button>
      </form>
      <p>Oder <a href="#" id="show-register">registrieren</a></p>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" class="hidden">
      <div id="counter"></div>
      <button id="btn-logout">Logout</button>
    </section>
  </div>

  <!-- Modular Firebase-SDKs -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script src="js/countdown.js"></script>
</body>
</html>
