<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Startseite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Willkommen, <span id="user-name">…</span>!</h2>
      <button id="logout">Ausloggen</button>
    </div>
  </div>
  <div class="nav-footer">
    <a href="settings.html">⚙️ Einstellungen</a>
    <a href="calendar.html">📅 Kalender</a>
    <a href="packlist.html">🧳 Packliste</a>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    // Nutzernamen anzeigen
    auth.onAuthStateChanged(async user => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        document.getElementById('user-name').textContent = snap.exists() ? snap.data().username : "Gast";
      }
    });
    // auth.js für Logout laden
    import "./js/auth.js";
  </script>
</body>
</html>
