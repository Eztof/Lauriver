<!-- index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lauriver</title>
  <script type="module">
    // 1️⃣ Firebase core + Auth
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    // 2️⃣ Konfig aus deiner Firebase‑Console
    const firebaseConfig = {
      apiKey:    "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain:"lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket:"lauriver-31a6f.appspot.com",
      messagingSenderId:"508140835438",
      appId:     "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    initializeApp(firebaseConfig);

    // 3️⃣ Prüfen, ob der User eingeloggt ist und weiterleiten
    const auth = getAuth();
    onAuthStateChanged(auth, user => {
      if (user) {
        // schon eingeloggt → Dashboard
        window.location.replace("dashboard.html");
      } else {
        // nicht eingeloggt → Login
        window.location.replace("login.html");
      }
    });
  </script>
</head>
<body>
  <p>Lade Lauriver…</p>
  <p>Falls nicht, <a href="login.html">hier zum Login</a> oder <a href="dashboard.html">hier zur Startseite</a>.</p>
</body>
</html>
