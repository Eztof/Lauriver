<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Countdown – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:1rem; background:#eef2f5; display:flex; flex-direction:column; height:100vh; }
    header { display:flex; justify-content:flex-end; }
    header button { margin-left:8px; padding:8px 12px; cursor:pointer; }
    main { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    #count { font-size:2rem; margin:1rem 0; }
    .nav-buttons { margin-top:20px; }
    .nav-buttons button {
      margin:0 8px;
      padding:10px 16px;
      font-size:1rem;
      cursor:pointer;
    }
    #settings { margin-top:40px; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <script>
    auth.onAuthStateChanged(user => {
      if (!user) return window.location.href = 'login.html';
      // schon eingeloggter User: alles anzeigen
      // hier ggf. weitere Daten laden…
      // visits steigern:
      db.collection('users').doc(user.uid).update({
        visits: firebase.firestore.FieldValue.increment(1)
      });
    });
  </script>

  <header>
    <button id="logout">Ausloggen</button>
  </header>

  <main>
    <h1>Seit dem 25. Januar 2025 sind vergangen:</h1>
    <div id="count">Lade…</div>

    <div class="nav-buttons">
      <button id="to-settings">Einstellungen</button>
      <button id="to-packliste">Packliste</button>
    </div>

    <div id="settings">
      <h2>Einstellungen</h2>
      <label>
        <input type="checkbox" id="dark-mode">
        Dark Mode aktivieren
      </label>
    </div>
  </main>

  <script>
    // Logout
    document.getElementById('logout').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });

    // Countdown
    const startDate = new Date('2025-01-25T00:00:00Z');
    function updateCounter() {
      const now = new Date();
      let diff = now - startDate;
      if (diff < 0) diff = 0;
      const secs = Math.floor(diff/1000)%60;
      const mins = Math.floor(diff/60000)%60;
      const hrs  = Math.floor(diff/3600000)%24;
      const days = Math.floor(diff/86400000);
      document.getElementById('count').textContent =
        `${days} Tage, ${hrs} Stunden, ${mins} Minuten, ${secs} Sekunden`;
    }
    setInterval(updateCounter, 1000);
    updateCounter();

    // Dark Mode laden und speichern
    auth.onAuthStateChanged(user => {
      if (!user) return;
      const ref = db.collection('users').doc(user.uid);
      ref.get().then(doc => {
        if (doc.exists && doc.data().settings.darkMode) {
          document.body.style.background = '#333';
          document.body.style.color = '#eee';
          document.getElementById('dark-mode').checked = true;
        }
      });
    });
    document.getElementById('dark-mode').addEventListener('change', e => {
      const on = e.target.checked;
      const uid = auth.currentUser.uid;
      db.collection('users').doc(uid).update({
        'settings.darkMode': on
      }).then(() => {
        document.body.style.background = on ? '#333' : '#eef2f5';
        document.body.style.color = on ? '#eee' : '#000';
      });
    });

    // Navigation-Buttons
    document.getElementById('to-settings').addEventListener('click', () => {
      document.getElementById('settings').scrollIntoView({ behavior: 'smooth' });
    });
    document.getElementById('to-packliste').addEventListener('click', () => {
      window.location.href = 'packliste.html';
    });
  </script>
</body>
</html>
