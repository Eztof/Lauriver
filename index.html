<!-- index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lauriver</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/app.js" defer></script>
</head>
<body>
  <header id="main-header" class="hidden">
    <h1>Lauriver</h1>
    <button id="logout-btn">Logout</button>
  </header>
  <main>
    <!-- LOGIN -->
    <section id="login-section" class="view">
      <h2>Einloggen</h2>
      <form id="login-form">
        <input type="text" id="login-username" placeholder="Benutzername" required>
        <input type="password" id="login-password" placeholder="Passwort" required>
        <label><input type="checkbox" id="remember-device"> Gerät merken</label>
        <button type="submit">Einloggen</button>
      </form>
      <p>Geht nicht... na dann: <a href="#" id="to-register">Registrieren</a></p>
    </section>

    <!-- REGISTRIEREN -->
    <section id="register-section" class="view hidden">
      <h2>Registrieren</h2>
      <form id="register-form">
        <input type="text" id="register-username" placeholder="Benutzername" required>
        <input type="password" id="register-password" placeholder="Passwort" required>
        <input type="password" id="register-password-confirm" placeholder="Passwort bestätigen" required>
        <button type="submit">Registrieren</button>
      </form>
      <p>Bereits registriert? <a href="#" id="to-login">Einloggen</a></p>
    </section>

    <!-- STARTSEITE -->
    <section id="home-section" class="view hidden">
      <h2>Startseite</h2>
      <nav>
        <button id="nav-calendar">Kalender</button>
        <button id="nav-packlist">Packliste</button>
        <button id="nav-timeline">Zeitstrang</button>
        <!-- Neuer Button für externen Link -->
        <button id="nav-kennzeichen">Kennzeichen ZYO</button>
      </nav>
    </section>

    <!-- KALENDER -->
    <section id="calendar-section" class="view hidden">
      <button class="back-btn">← Zurück</button>
      <h2>Kalender</h2>

      <!-- Event hinzufügen -->
      <form id="event-form">
        <input type="text" id="event-title" placeholder="Titel" required>
        <input type="date" id="event-date" required>
        <input type="time" id="event-time" required>
        <button type="submit">Event hinzufügen</button>
      </form>

      <!-- Liste der Events -->
      <ul id="event-list"></ul>
    </section>

    <!-- PACKLISTE -->
    <section id="packlist-section" class="view hidden">
      <button class="back-btn">← Zurück</button>
      <h2>Packliste</h2>
      <form id="category-form">
        <input type="text" id="category-input" placeholder="Neue Kategorie hinzufügen" required>
        <button type="submit">Kategorie erstellen</button>
      </form>
      <form id="packlist-form">
        <input type="text" id="packlist-input" placeholder="Item hinzufügen" required>
        <select id="category-select">
          <option value="">– Keine Kategorie –</option>
        </select>
        <button type="submit">Hinzufügen</button>
      </form>
      <ul id="packlist-items"></ul>
    </section>

    <!-- ZEITSTRANG -->
    <section id="timeline-section" class="view hidden">
      <button class="back-btn">← Zurück</button>
      <h2>Zeitstrang</h2>
      <p>Ich liebe dich, Laura!</p>
    </section>
  </main>
</body>
</html>
