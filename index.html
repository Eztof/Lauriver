<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lauriver</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <!-- LOGIN -->
    <section id="login-section" class="auth-section">
      <h1>Lauriver</h1>
      <form id="form-login" class="auth-form">
        <label for="login-username">Benutzername</label>
        <input id="login-username" name="username" type="text" autocomplete="username" required/>
        <label for="login-password">Passwort</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required/>
        <label class="checkbox">
          <input id="login-remember" type="checkbox"/>
          <span>Gerät merken</span>
        </label>
        <button type="submit" class="btn primary">Einloggen</button>
      </form>
      <p class="switch">
        Noch keinen Account? <a href="#" id="show-register">Registrieren</a>
      </p>
    </section>

    <!-- REGISTER -->
    <section id="register-section" class="auth-section hidden">
      <h1>Lauriver</h1>
      <form id="form-register" class="auth-form">
        <label for="reg-username">Benutzername</label>
        <input id="reg-username" name="username" type="text" autocomplete="username" required/>
        <label for="reg-password">Passwort</label>
        <input id="reg-password" name="password" type="password" autocomplete="new-password" required/>
        <label class="checkbox">
          <input id="reg-remember" type="checkbox"/>
          <span>Gerät merken</span>
        </label>
        <button type="submit" class="btn primary">Registrieren</button>
      </form>
      <p class="switch">
        Bereits registriert? <a href="#" id="show-login">Einloggen</a>
      </p>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard" class="hidden">
      <header class="header">
        <h1>Lauriver</h1>
        <button id="btn-logout" class="btn secondary">Logout</button>
      </header>
      <div class="content">
        <div id="counter" class="card centered"></div>
        <button id="btn-packlist" class="btn primary block">Packlisten verwalten</button>
      </div>
    </section>
  </div>

  <!-- Firebase & App Scripts -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script src="js/countdown.js"></script>
  <script>
    document.getElementById('btn-packlist').addEventListener('click', () => {
      window.location.href = 'packlist.html';
    });
  </script>
</body>
</html>
