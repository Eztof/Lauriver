<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lauriver</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer type="module" src="js/app.js"></script>
</head>
<body>
  <header>
    <button id="btn-menu" class="icon-btn hidden" aria-label="Navigation">☰</button>
    <h1>Lauriver</h1>
    <div id="header-icons" class="hidden">
      <button id="btn-settings" class="icon-btn" aria-label="Einstellungen">⚙️</button>
      <button id="btn-logout" class="icon-btn" aria-label="Abmelden">⎋</button>
    </div>
  </header>

  <nav id="drawer" class="drawer hidden">
    <ul>
      <li><a href="#" data-show="dashboard">Startseite</a></li>
      <li><a href="#" data-show="calendar">Kalender</a></li>
      <li><a href="#" data-show="packing">Packliste</a></li>
      <li><a href="#" data-show="settings">Einstellungen</a></li>
    </ul>
  </nav>

  <main>
    <!-- Auth-Container -->
    <section id="auth-container" class="card">
      <form id="login-form">
        <h2>Anmelden</h2>
        <input id="login-username" type="text" placeholder="Benutzername" required autocomplete="username">
        <input id="login-password" type="password" placeholder="Passwort" required autocomplete="current-password">
        <label><input id="remember-me" type="checkbox"> Gerät merken</label>
        <button type="submit">Anmelden</button>
        <p><a href="#" id="show-register">Registrieren</a></p>
      </form>
      <form id="register-form" class="hidden">
        <h2>Registrieren</h2>
        <input id="reg-username" type="text" placeholder="Benutzername" required autocomplete="username">
        <input id="reg-password" type="password" placeholder="Passwort (min. 6 Zeichen)" required autocomplete="new-password">
        <button type="submit">Registrieren</button>
        <p>Bereits registriert? <a href="#" id="show-login">Anmelden</a></p>
      </form>
    </section>

    <!-- Dashboard (leer) -->
    <section id="dashboard" class="card hidden">
      <!-- leer -->
    </section>

    <!-- Kalender -->
    <section id="calendar" class="card hidden">
      <h2>Kalender</h2>
      <p>Platzhalter</p>
    </section>

    <!-- Packliste -->
    <section id="packing" class="card hidden">
      <h2>Packliste</h2>
      <form id="packing-form" class="packing-form">
        <input id="new-item" type="text" placeholder="Neuen Eintrag hinzufügen" required>
        <button type="submit">Hinzufügen</button>
      </form>
      <ul id="packing-list"></ul>
    </section>

    <!-- Einstellungen -->
    <section id="settings" class="card hidden">
      <h2>Einstellungen</h2>
      <label><input id="toggle-dark" type="checkbox"> Dunkelmodus</label>
      <button id="btn-back">Zurück</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Lauriver</p>
  </footer>
</body>
</html>
