<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Countdown – Lauriver</title>
  <!-- Firebase App (core SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    // Deine Firebase-Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyA0WC5gDtcq4znUZxqvGn5j1BPodnsgg9E",
      authDomain: "lauriver-31a6f.firebaseapp.com",
      projectId: "lauriver-31a6f",
      storageBucket: "lauriver-31a6f.firebasestorage.app",
      messagingSenderId: "508140835438",
      appId: "1:508140835438:web:4326ed6b40c01037e64c7f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; margin:0; padding:1rem; background:#eef2f5; height:100vh; }
    header { width:100%; display:flex; justify-content:flex-end; }
    button { padding:8px 12px; cursor:pointer; }
    main { text-align:center; flex:1; display:flex; flex-direction:column; justify-content:center; }
    #count { font-size:2rem; margin-top:1rem; }
    #settings { margin-top:20px; }
  </style>
</head>
<body>
  <script>
    // Auth‑Schutz
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        loadUserData(user.uid);
      }
    });

    function loadUserData(uid) {
      const userRef = db.collection('users').doc(uid);
      userRef.get().then(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        // Beispiel: Dark Mode Setting anzeigen
        const darkCheckbox = document.getElementById('dark-mode');
        if (data.settings.darkMode) {
          document.body.style.background = '#333';
          document.body.style.color = '#eee';
          darkCheckbox.checked = true;
        }
      });
    }
  </script>

  <header>
    <button id="logout">Ausloggen</button>
  </header>

  <main>
    <h1>Seit dem 25. Januar 2025 sind vergangen:</h1>
    <div id="count">Lade…</div>

    <div id="settings">
      <label>
        <input type="checkbox" id="dark-mode">
        Dark Mode aktivieren
      </label>
    </div>
  </main>

  <script>
    // Logout
    document.getElementById('logout').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });

    // Countdown
    const startDate = new Date('2025-01-25T00:00:00Z');
    function updateCounter() {
      const now  = new Date();
      let diff    = now - startDate;
      if (diff < 0) diff = 0;
      const secs = Math.floor(diff/1000)%60;
      const mins = Math.floor(diff/60000)%60;
      const hrs  = Math.floor(diff/3600000)%24;
      const days = Math.floor(diff/86400000);
      document.getElementById('count').textContent =
        `${days} Tage, ${hrs} Stunden, ${mins} Minuten, ${secs} Sekunden`;
    }
    setInterval(updateCounter, 1000);
    updateCounter();

    // Dark Mode Setting speichern
    document.getElementById('dark-mode').addEventListener('change', e => {
      const enabled = e.target.checked;
      const uid = auth.currentUser.uid;
      db.collection('users').doc(uid).update({
        'settings.darkMode': enabled
      }).then(() => {
        if (enabled) {
          document.body.style.background = '#333';
          document.body.style.color = '#eee';
        } else {
          document.body.style.background = '#eef2f5';
          document.body.style.color = '#000';
        }
      });
    });

    // Visits pro Seitenaufruf inkrementieren
    auth.onAuthStateChanged(user => {
      if (!user) return;
      db.collection('users').doc(user.uid).update({
        visits: firebase.firestore.FieldValue.increment(1)
      });
    });
  </script>
</body>
</html>
